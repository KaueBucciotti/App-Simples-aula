<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Monitoramento</title>
</head>
<body>
    <h1>Status do Sistema</h1>
    <div id="conteudo">Carregando dados...</div>

    <script>
        fetch('/api/status')
            .then(res => res.json())
            .then(dados => {
                document.getElementById('conteudo').innerText = dados.mensagem;
            });
    </script>
</body>
</html>
